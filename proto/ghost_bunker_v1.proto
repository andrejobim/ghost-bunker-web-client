syntax = "proto3";

package ghostbunker.v1;

option java_multiple_files = true;
option java_package = "io.ghostbunker.protocol.v1";
option java_outer_classname = "GhostBunkerProto";
option go_package = "github.com/ghostbunker/protocol/gen/go/ghostbunker/v1;ghostbunkerv1";
option csharp_namespace = "GhostBunker.Protocol.V1";
option objc_class_prefix = "GBP";

// Ghost Bunker Protocol v0.1
//
// This file defines the wire contract used inside WebSocket binary frames.
// It intentionally does not define gRPC services or RPC methods.
//
// Privacy constraints:
// - No IP field.
// - No remote_address field.
// - No fingerprint field.
// - No persistent device_id field.
// - No plaintext/text field for chat messages.
// - Chat content must be transported only as ciphertext.

message GhostEnvelope {
  // Protocol identifier. Expected value in v0.1: "ghost-bunker".
  string protocol = 1;

  // Protocol version. Expected value in v0.1: "0.1".
  string version = 2;

  // Unique identifier for this envelope.
  // Recommended format: random UUID/ULID/string generated by the sender.
  string message_id = 3;

  // Sender-side timestamp in milliseconds since Unix epoch.
  // Implementations must not rely on this value for trust decisions.
  uint64 timestamp_ms = 4;

  // Message type. Must match the payload selected in the oneof below.
  MessageType type = 5;

  // Optional correlation id for request/response flows.
  // Example: SEND_ENCRYPTED_MESSAGE -> MESSAGE_ACCEPTED.
  string request_id = 6;

  // Optional room identifier used for routing room-scoped messages.
  // Must be ASCII-visible and validated by the implementation.
  string room_id = 7;

  oneof payload {
    Hello hello = 20;
    Welcome welcome = 21;
    JoinRoom join_room = 22;
    RoomJoined room_joined = 23;
    LeaveRoom leave_room = 24;
    RoomLeft room_left = 25;
    SendEncryptedMessage send_encrypted_message = 26;
    MessageAccepted message_accepted = 27;
    EncryptedMessage encrypted_message = 28;
    MessageReceivedAck message_received_ack = 29;
    Ping ping = 30;
    Pong pong = 31;
    ErrorMessage error = 32;
    Disconnect disconnect = 33;
    Goodbye goodbye = 34;
  }

  reserved 8 to 19;
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  HELLO = 1;
  WELCOME = 2;
  JOIN_ROOM = 3;
  ROOM_JOINED = 4;
  LEAVE_ROOM = 5;
  ROOM_LEFT = 6;
  SEND_ENCRYPTED_MESSAGE = 7;
  MESSAGE_ACCEPTED = 8;
  ENCRYPTED_MESSAGE = 9;
  MESSAGE_RECEIVED_ACK = 10;
  PING = 11;
  PONG = 12;
  ERROR = 13;
  DISCONNECT = 14;
  GOODBYE = 15;
}

enum CipherSuite {
  CIPHER_SUITE_UNSPECIFIED = 0;

  // Mandatory reference suite for Ghost Bunker Protocol v0.1.
  PBKDF2_HMAC_SHA256_AES_256_GCM = 1;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  UNSUPPORTED_VERSION = 1;
  BAD_ENVELOPE = 2;
  BAD_METADATA = 3;
  PAYLOAD_TOO_LARGE = 4;
  CIPHERTEXT_TOO_LARGE = 5;
  TOO_MANY_ROOMS = 6;
  NOT_IN_ROOM = 7;
  HANDSHAKE_TIMEOUT = 8;
  PROTOCOL_VIOLATION = 9;
  CLIENT_TOO_SLOW = 10;
  RATE_LIMITED_CONNECTION = 11;
  INTERNAL_ERROR = 12;
}

enum DisconnectReason {
  DISCONNECT_REASON_UNSPECIFIED = 0;
  CLIENT_REQUEST = 1;
  SERVER_SHUTDOWN = 2;
  IDLE_TIMEOUT = 3;
  PONG_TIMEOUT = 4;
  PROTOCOL_ERROR = 5;
  TOO_MANY_VIOLATIONS = 6;
  POLICY_ERROR = 7;
}

message ClientCapabilities {
  // Indicates that the client can send and receive encrypted chat payloads.
  bool e2ee_supported = 1;

  // Cipher suites supported by the client.
  repeated CipherSuite supported_cipher_suites = 2;

  // Maximum ciphertext size supported by the client.
  uint32 max_ciphertext_bytes_supported = 3;

  reserved 4 to 16;
}

message ProtocolLimits {
  uint32 max_envelope_bytes = 1;
  uint32 max_ciphertext_bytes = 2;
  uint32 max_plaintext_bytes_before_encryption = 3;
  uint32 max_nickname_chars = 4;
  uint32 max_room_id_chars = 5;
  uint32 max_rooms_per_connection = 6;
  uint32 handshake_timeout_ms = 7;
  uint32 ping_interval_ms = 8;
  uint32 pong_timeout_ms = 9;
  uint32 idle_timeout_ms = 10;

  reserved 11 to 32;
}

message Hello {
  // Optional client implementation name, e.g. "ghost-web".
  // Must not be used as identity.
  string client_name = 1;

  // Optional user-visible nickname.
  // Must be validated as ASCII-visible by implementations.
  string nickname = 2;

  // Optional client capabilities.
  ClientCapabilities capabilities = 3;

  reserved 4 to 16;
}

message Welcome {
  // Ephemeral session id generated by the server for this connection.
  // It is not a credential and must not be treated as durable identity.
  string session_id = 1;

  // Ephemeral user id generated by the server for this connection.
  // It is not a credential and must not be treated as durable identity.
  string user_id = 2;

  // User-visible display name accepted or generated by the server.
  string display_name = 3;

  // Server-side timestamp in milliseconds since Unix epoch.
  uint64 server_time_ms = 4;

  // Effective protocol limits for this connection.
  ProtocolLimits limits = 5;

  // Effective heartbeat interval in milliseconds.
  uint32 ping_interval_ms = 6;

  reserved 7 to 16;
}

message JoinRoom {
  // Room id is also carried in GhostEnvelope.room_id.
  // This field can repeat it for payload-level validation if desired.
  string room_id = 1;

  reserved 2 to 16;
}

message RoomJoined {
  string room_id = 1;

  // Optional online count for the room.
  // This is aggregate metadata, not identity.
  uint32 online_count = 2;

  reserved 3 to 16;
}

message LeaveRoom {
  string room_id = 1;

  reserved 2 to 16;
}

message RoomLeft {
  string room_id = 1;

  reserved 2 to 16;
}

message SendEncryptedMessage {
  // Client-generated id for deduplication/correlation within the active session.
  string client_message_id = 1;

  // Non-secret key identifier. It helps clients identify which local room key to use.
  string key_id = 2;

  // Cipher suite used to encrypt the payload.
  CipherSuite cipher_suite = 3;

  // Nonce/IV used by the AEAD algorithm.
  // For AES-GCM in v0.1, 12 bytes are recommended.
  bytes nonce = 4;

  // Encrypted chat payload.
  // Must never contain plaintext.
  bytes ciphertext = 5;

  // Optional associated data version.
  // The actual AAD is reconstructed by clients from non-secret envelope fields.
  uint32 aad_version = 6;

  reserved 7 to 32;
}

message MessageAccepted {
  // Correlation id copied from GhostEnvelope.request_id when present.
  string request_id = 1;

  // Client message id from SendEncryptedMessage.
  string client_message_id = 2;

  // Server-generated id for the routed encrypted message.
  string server_message_id = 3;

  string room_id = 4;

  uint64 accepted_at_ms = 5;

  reserved 6 to 16;
}

message EncryptedMessage {
  // Server-generated id for this routed encrypted message.
  string server_message_id = 1;

  // Ephemeral sender id assigned by the server for the active connection/session.
  string from_user_id = 2;

  // Non-secret key identifier.
  string key_id = 3;

  // Cipher suite used to encrypt the payload.
  CipherSuite cipher_suite = 4;

  // Nonce/IV used by the AEAD algorithm.
  bytes nonce = 5;

  // Encrypted chat payload.
  // Must never contain plaintext.
  bytes ciphertext = 6;

  // Server-side timestamp for routing/ordering hints.
  uint64 sent_at_ms = 7;

  // Optional associated data version.
  uint32 aad_version = 8;

  reserved 9 to 32;
}

message MessageReceivedAck {
  string server_message_id = 1;
  string room_id = 2;
  uint64 received_at_ms = 3;

  reserved 4 to 16;
}

message Ping {
  // Random server-generated value to be echoed by Pong.
  string nonce = 1;

  reserved 2 to 8;
}

message Pong {
  // Must echo the nonce received in Ping.
  string nonce = 1;

  reserved 2 to 8;
}

message ErrorMessage {
  ErrorCode code = 1;

  // Short sanitized message. Must not contain payload, ciphertext, headers, IPs, or secrets.
  string message = 2;

  // Optional correlation id copied from GhostEnvelope.request_id when applicable.
  string request_id = 3;

  // Suggested retry/backoff in milliseconds.
  uint32 retry_after_ms = 4;

  reserved 5 to 16;
}

message Disconnect {
  DisconnectReason reason = 1;

  reserved 2 to 8;
}

message Goodbye {
  DisconnectReason reason = 1;

  // Optional sanitized message.
  string message = 2;

  reserved 3 to 8;
}

